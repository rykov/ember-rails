name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run lint

  test:
    name: Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm install
      - run: npm test

  ember-try:
    name: Ember ${{ matrix.ember-version }}
    runs-on: ubuntu-latest
    needs: [lint, test]
    strategy:
      fail-fast: false
      matrix:
        include:
          # Ember 6.8+ uses Vite, which is not yet supported by this addon.
          # Only test against the last Broccoli/Webpack-based LTS.
          - ember-version: 'lts-6.4'
            ember-cli: '~6.4.0'
            node-version: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
      - run: npm install
      - name: Generate Ember app and test addon integration
        run: |
          npx ember-cli@${{ matrix.ember-cli }} new test-app --skip-git --skip-npm --no-welcome
          cd test-app
          npm install
          npm install --save-dev ../
          npx ember build --environment=production
      - name: Verify gem was built
        run: ls test-app/dist-rails/*.gem
