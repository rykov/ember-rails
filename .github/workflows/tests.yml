name: Tests

on:
  push:
    branches: [main, v2]
  pull_request:
    branches: [main, v2]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: npm install
      - run: npm run lint

  test:
    name: Tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm install
      - run: npm test

  ember-try:
    name: Ember ${{ matrix.ember-version }}
    runs-on: ubuntu-latest
    needs: [lint, test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - ember-version: 'lts-6.4'
            ember-cli: '~6.4.0'
            node-version: 20
            build-type: webpack
          - ember-version: 'lts-6.8'
            ember-cli: '~6.8.0'
            node-version: 20
            build-type: vite
          - ember-version: 'latest'
            ember-cli: 'latest'
            node-version: 22
            build-type: vite
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
      - run: npm install
      - name: Generate Ember app and test addon integration
        run: |
          npx ember-cli@${{ matrix.ember-cli }} new test-app --skip-git --skip-npm --no-welcome --no-ember-data
          cd test-app
          npm install
          npm install --save-dev ../
          if [ "${{ matrix.build-type }}" = "vite" ]; then
            node ../test/fixtures/inject-vite-plugin.mjs vite.config.mjs
          else
            cp ../test/fixtures/ember-cli-build.mjs ember-cli-build.mjs
          fi
          npx ember build --environment=production
      - name: Verify gem was built
        run: ls test-app/dist-rails/*.gem
